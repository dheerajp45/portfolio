    .card:hover {

    }

      background: var(--fg);
      color: #fff;
      font-weight: 600;
      transition: background 0.15s, transform 0.15s;
    }
    .btn-primary:hover {
      background: #262626;
      transform: translateY(-1px);
    }

    .btn-ghost {
      border: 1px solid var(--border-light);
      color: var(--fg);
      background: #fff;
      transition: border-color 0.15s, background 0.15s, color 0.15s, transform 0.15s;

    .btn-ghost:hover {
      border-color: var(--accent);
      color: var(--accent);
      background: var(--accent-dim);
      transform: translateY(-1px);

      color: var(--dim);
      transition: color 0.15s, background 0.15s;
    }
    .icon-btn:hover { color: var(--fg); background: var(--soft); }

      border: 1px solid var(--border);
      border-radius: 12px;
      overflow: hidden;

      display: flex;
      align-items: center;
      gap: 8px;
      padding: 12px 16px;
      background: #f0f0f0;
      border-bottom: 1px solid var(--border);

    .terminal-dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
    }

      font-size: 13px;
      line-height: 1.75;

      height: 14px;

      margin-left: 2px;
